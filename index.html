<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#06091A">
  <title>Mana Collector</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; overflow: hidden; overscroll-behavior: none; }

    body {
      font-family: 'Press Start 2P', monospace;
      background: #06091A;
      color: #44FFCC;
      user-select: none;
    }

    /* ══════════════════════════════════════════
       SCENE — fixed backdrop
    ══════════════════════════════════════════ */
    .scene {
      position: fixed;
      inset: 0;
      z-index: 0;
      /* Night sky gradient */
      background: linear-gradient(180deg,
        #05071A 0%,
        #090E30 18%,
        #0D1545 38%,
        #0B1238 62%,
        #09100E 85%,
        #060C08 100%
      );
    }

    /* Stars canvas */
    #stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    /* ── MOON ── */
    .moon-wrap {
      position: fixed;
      top: 4%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      animation: moonBreath 16s ease-in-out infinite;
    }
    @keyframes moonBreath {
      0%,100% { opacity: 0.68; filter: drop-shadow(0 0 8px rgba(232,248,255,0.22)); }
      50%     { opacity: 1.00; filter: drop-shadow(0 0 22px rgba(232,248,255,0.60)); }
    }
    .moon-wrap.moon-burst {
      animation: moonFlare 1.4s ease-out forwards, moonBreath 16s ease-in-out 1.4s infinite;
    }
    @keyframes moonFlare {
      0%  { opacity: 0.8; filter: drop-shadow(0 0 12px rgba(232,248,255,0.38)); }
      25% { opacity: 1.0; filter: drop-shadow(0 0 44px rgba(255,255,255,0.92)); }
      100%{ opacity: 0.9; filter: drop-shadow(0 0 18px rgba(232,248,255,0.45)); }
    }

    /* ── CLOUDS (blurred CSS shapes) ── */
    .cloud { position: fixed; pointer-events: none; z-index: 3; border-radius: 50%; }
    .cl1 { width:240px; height:160px; top:22%; left:-70px;
           background: radial-gradient(ellipse 68% 58% at 62% 50%, #231650 0%, #170E3A 45%, transparent 100%);
           filter: blur(18px); }
    .cl2 { width:210px; height:140px; top:16%; right:-60px;
           background: radial-gradient(ellipse 68% 58% at 38% 50%, #1D1248 0%, #130C30 45%, transparent 100%);
           filter: blur(18px); }
    .cl3 { width:170px; height:100px; top:36%; left:-30px;
           background: radial-gradient(ellipse 70% 60% at 65% 50%, #1A1040 0%, transparent 100%);
           filter: blur(22px); }
    .cl4 { width:180px; height:110px; top:30%; right:-25px;
           background: radial-gradient(ellipse 70% 60% at 35% 50%, #180E38 0%, transparent 100%);
           filter: blur(22px); }

    /* Subtle scanlines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent 0px, transparent 3px,
        rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px
      );
      pointer-events: none;
      z-index: 800;
    }

    /* ══════════════════════════════════════════
       UI  — overlay on scene
    ══════════════════════════════════════════ */
    .ui {
      position: relative;
      z-index: 10;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 22px;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      gap: 0;
    }

    /* ── TITLE ── */
    .title {
      font-size: 9px;
      color: #8899BB;
      letter-spacing: 3px;
      text-align: center;
      text-shadow: 0 0 10px rgba(100,150,220,0.35);
    }

    /* ── TIMER — 5-stage color progression (white → red) ── */
    .timer {
      font-size: 54px;
      letter-spacing: 5px;
      /* Stage 0: > 65% — almost white */
      color: #E8F8FF;
      text-shadow: 0 0 14px rgba(200,240,255,0.55), 0 0 30px rgba(160,220,255,0.20);
      line-height: 1;
      text-align: center;
      transition: color .8s, text-shadow .8s;
    }
    .timer.tc1 {
      /* Stage 1: 40-65% — cyan */
      color: #44FFEE;
      text-shadow: 0 0 14px rgba(68,255,238,0.65), 0 0 30px rgba(0,200,180,0.25);
    }
    .timer.tc2 {
      /* Stage 2: 22-40% — gold */
      color: #FFCC44;
      text-shadow: 0 0 14px rgba(255,200,60,0.72), 0 0 30px rgba(255,160,0,0.28);
    }
    .timer.tc3 {
      /* Stage 3: 8-22% — orange */
      color: #FF8C22;
      text-shadow: 0 0 14px rgba(255,140,34,0.78), 0 0 30px rgba(255,100,0,0.32);
    }
    .timer.tc4 {
      /* Stage 4: < 8% — red */
      color: #FF3355;
      text-shadow: 0 0 16px rgba(255,50,85,0.85), 0 0 32px rgba(220,0,30,0.40);
    }

    /* ── PROGRESS BAR ── */
    .progress-track {
      width: 100%;
      max-width: 350px;
      height: 8px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #FF8899;
      box-shadow: 0 0 7px #FF8899;
      transition: width 1s linear, background .5s, box-shadow .5s;
    }

    /* ── DIVIDER ── */
    .divider {
      width: 100%;
      max-width: 350px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(80,120,180,0.25) 30%,
                                         rgba(80,120,180,0.25) 70%, transparent);
    }

    /* ── MANA SECTION ── */
    .mana-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      width: 100%;
    }
    .mana-label {
      font-size: 7px;
      color: #557799;
      letter-spacing: 3px;
    }

    /* Gem + number stacked container */
    .mana-gem-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100px;
      height: 118px;
    }

    /* Gem icon — behind the number */
    .gem-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 0;
    }

    /* Mana number — on top of the gem */
    .mana-num {
      position: relative;
      z-index: 1;
      font-size: 32px;
      color: #44FFCC;
      text-shadow: 0 0 10px rgba(68,255,204,0.70);
      text-align: center;
      transition: color .5s, text-shadow .5s;
      min-width: 3ch;
    }
    .mana-num.t1 { color: #44FFEE; text-shadow: 0 0 10px rgba(68,255,238,.70); }
    .mana-num.t2 { color: #FFD700; text-shadow: 0 0 10px rgba(255,215,0,.75),  0 0 22px rgba(255,170,0,.30); }
    .mana-num.t3 { color: #FF7766; text-shadow: 0 0 10px rgba(255,100,80,.70); }
    .mana-num.t4 { color: #FF88CC; text-shadow: 0 0 10px rgba(255,136,204,.70); }
    .mana-num.t5 { color: #EEEEFF; text-shadow: 0 0 12px rgba(220,220,255,.90); }

    /* Pips */
    .pips {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      justify-content: center;
      max-width: 250px;
    }
    .pip {
      width: 10px; height: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.10);
    }
    .pip.on {
      background: var(--pc, #44FFCC);
      box-shadow: 0 0 5px var(--pc, #44FFCC);
      border-color: transparent;
    }
    .pip-extra { font-size: 6px; color: #446688; align-self: center; }

    .streak {
      font-size: 8px;
      color: #44FF88;
      text-shadow: 0 0 6px rgba(68,255,136,0.50);
    }
    .bonus-badge {
      font-size: 6px;
      color: #FFCC44;
      text-shadow: 0 0 6px #FFAA00;
      letter-spacing: 1px;
    }

    /* ── BUTTONS ── */
    .btn-row {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 350px;
    }
    .btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      flex: 1;
      padding: 13px 6px;
      background: transparent;
      border: 2px solid;
      cursor: pointer;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
      transition: transform .05s, opacity .1s;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn:active { transform: translateY(2px); opacity: .8; }
    .btn-go   { color: #44FFCC; border-color: #44FFCC;
                box-shadow: 0 0 10px rgba(68,255,204,.18), inset 0 0 10px rgba(68,255,204,.04); }
    .btn-stop { color: #FF5566; border-color: #FF5566;
                box-shadow: 0 0 10px rgba(255,85,102,.18), inset 0 0 10px rgba(255,85,102,.04); }

    /* ── INTERVAL ── */
    .interval-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .interval-label { font-size: 6px; color: #557799; letter-spacing: 2px; }
    .interval-row   { display: flex; align-items: center; gap: 18px; }
    .ibt {
      font-family: 'Press Start 2P', monospace;
      font-size: 15px;
      color: #44AACC;
      background: rgba(68,170,204,0.07);
      border: 2px solid rgba(68,170,204,0.28);
      width: 36px; height: 36px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      border-radius: 3px;
      -webkit-tap-highlight-color: transparent;
    }
    .ibt:active { background: rgba(68,170,204,0.18); transform: translateY(1px); }
    .ival { font-size: 20px; color: #66CCEE; min-width: 3ch; text-align: center; }

    /* ── COMPLETION FLASH ── */
    .flash-layer {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      z-index: 500; pointer-events: none;
    }
    .flash-msg {
      font-family: 'Press Start 2P', monospace;
      font-size: 15px;
      line-height: 2.2;
      padding: 22px 30px;
      background: rgba(4,7,22,0.96);
      border: 2px solid;
      text-align: center;
      animation: popIn .14s ease-out, fadeUp 2.4s .5s forwards;
    }
    @keyframes popIn {
      from { transform: scale(.65); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    @keyframes fadeUp {
      from { transform: translateY(0); opacity: 1; }
      to   { transform: translateY(-70px); opacity: 0; }
    }

    /* Spacing utility */
    .g6  { height: 6px; }
    .g8  { height: 8px; }
    .g12 { height: 12px; }
    .g16 { height: 16px; }
    .g20 { height: 20px; }
    .g24 { height: 24px; }
  </style>
</head>
<body>

<!-- ══════════════  SCENE  ══════════════ -->
<div class="scene">
  <canvas id="stars"></canvas>

  <!-- Crescent moon (SVG mask) -->
  <div class="moon-wrap" id="moonWrap">
    <svg width="116" height="116" viewBox="0 0 116 116">
      <defs>
        <mask id="cres">
          <rect width="116" height="116" fill="black"/>
          <circle cx="62" cy="56" r="46" fill="white"/>
          <circle cx="38" cy="47" r="40" fill="black"/>
        </mask>
      </defs>
      <!-- Body -->
      <circle cx="62" cy="56" r="46" fill="#E8F8FF" mask="url(#cres)"/>
      <!-- Highlight -->
      <circle cx="76" cy="40" r="16" fill="#FFFFFF" opacity="0.50" mask="url(#cres)"/>
      <!-- Shadow (subtle cool tone) -->
      <ellipse cx="60" cy="72" rx="24" ry="18" fill="#90B8CC" opacity="0.22" mask="url(#cres)"/>
      <!-- Pixel texture (crater-like marks) -->
      <g mask="url(#cres)" fill="#7AAABB" opacity="0.18">
        <rect x="57" y="32" width="4" height="4"/>
        <rect x="74" y="52" width="3" height="3"/>
        <rect x="64" y="64" width="4" height="4"/>
        <rect x="48" y="48" width="3" height="3"/>
        <rect x="82" y="40" width="2" height="2"/>
        <rect x="52" y="70" width="2" height="2"/>
      </g>
    </svg>
  </div>

  <!-- Clouds -->
  <div class="cloud cl1"></div>
  <div class="cloud cl2"></div>
  <div class="cloud cl3"></div>
  <div class="cloud cl4"></div>

</div>

<!-- ══════════════  UI  ══════════════ -->
<div class="ui">

  <div class="title">✦ MANA COLLECTOR ✦</div>
  <div class="g20"></div>

  <div class="timer" id="timer">25:00</div>
  <div class="g12"></div>

  <div class="progress-track" style="width:100%">
    <div class="progress-fill" id="progressFill" style="width:100%"></div>
  </div>
  <div class="g16"></div>

  <div class="divider"></div>
  <div class="g16"></div>

  <div class="mana-section">
    <div class="mana-label">— MANA —</div>
    <div class="g8"></div>

    <!-- Gem + number stacked: crystal behind, number in front -->
    <div class="mana-gem-wrap">
      <svg class="gem-icon" id="gemIcon" width="100" height="118" viewBox="0 0 42 50">
        <polygon points="21,2 38,13 38,37 21,48 4,37 4,13"
                 fill="rgba(68,255,204,0.06)" stroke="#44FFCC" stroke-width="1.5" opacity="0.80"/>
        <polygon points="21,8 33,16 21,42 9,16"
                 fill="rgba(68,255,204,0.09)"/>
        <line x1="21" y1="2"  x2="21" y2="48" stroke="#44FFCC" stroke-width="0.6" opacity="0.22"/>
        <line x1="4"  y1="13" x2="38" y2="37" stroke="#44FFCC" stroke-width="0.6" opacity="0.22"/>
        <line x1="38" y1="13" x2="4"  y2="37" stroke="#44FFCC" stroke-width="0.6" opacity="0.22"/>
      </svg>
      <div class="mana-num" id="manaNum">0</div>
    </div>
    <div class="g6"></div>
    <div class="pips" id="pips"></div>
    <div class="g8"></div>
    <div class="streak" id="streak">RACHA: 0</div>
    <div class="bonus-badge" id="bonusBadge" style="opacity:0">BONUS ACTIVO</div>
  </div>

  <div class="g16"></div>
  <div class="divider"></div>
  <div class="g16"></div>

  <div class="btn-row">
    <button class="btn btn-go"   id="startBtn" onclick="toggleTimer()">▶  INICIAR</button>
    <button class="btn btn-stop"              onclick="resetAll()">○  RESET</button>
  </div>
  <div class="g12"></div>

  <div class="interval-wrap">
    <div class="interval-label">INTERVALO (MIN)</div>
    <div class="g8"></div>
    <div class="interval-row">
      <button class="ibt" onclick="adjInterval(-5)">-</button>
      <div class="ival" id="ival">25</div>
      <button class="ibt" onclick="adjInterval(+5)">+</button>
    </div>
  </div>

</div>

<div class="flash-layer" id="flashLayer"></div>

<script>
// ═══════════════════════════════════════════════════════════
//  MANA TIERS  (color schemes per multiple-of-5)
// ═══════════════════════════════════════════════════════════
const TIER_CLASSES  = ['', 't1', 't2', 't3', 't4', 't5'];
const PIP_COLORS    = ['#44FFCC', '#00FFEE', '#FFD700', '#FF7766', '#FF88CC', '#CCCCFF'];
const GEM_COLORS    = ['#44FFCC', '#22FFEE', '#FFD700', '#FF7766', '#FF88CC', '#DDDDFF'];
const FLASH_COLORS  = ['#44FFCC', '#00FFEE', '#FFD700', '#FF7766', '#FF88CC', '#EEEEFF'];

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
const S = {
  mana:       0,
  streak:     0,
  interval:   25,
  remaining:  25 * 60,
  total:      25 * 60,
  running:    false,
  warnedAt60: false,
};
let timerId  = null;
let hiddenAt = null;

function tier() {
  return Math.min(Math.floor(S.mana / 5), TIER_CLASSES.length - 1);
}

// ═══════════════════════════════════════════════════════════
//  STARFIELD  (cross/plus shaped, golden, with random flares)
// ═══════════════════════════════════════════════════════════
const SC  = document.getElementById('stars');
const SCX = SC.getContext('2d');
let stars  = [];
let lastTs = 0;

function initStars() {
  SC.width  = window.innerWidth;
  SC.height = window.innerHeight;
  stars = Array.from({ length: 75 }, () => ({
    x:    Math.random() * SC.width,
    y:    Math.random() * SC.height * 0.88,   // fill full sky (no landscape)
    sz:   Math.random() > 0.88 ? 3 : Math.random() > 0.65 ? 2 : 1,
    ph:   Math.random() * Math.PI * 2,
    sp:   0.10 + Math.random() * 0.35,
    warm: Math.random() > 0.28,               // 72% golden, 28% cool white
    flareCd: Math.random() * 14,              // staggered so they don't all flare at once
    flare:   0,                               // 0..1 flare intensity
  }));
}

function starsLoop(ts) {
  const dt = lastTs ? Math.min((ts - lastTs) / 1000, 0.1) : 0;
  lastTs = ts;

  SCX.clearRect(0, 0, SC.width, SC.height);

  stars.forEach(s => {
    // ── Flare timer ──────────────────────────
    s.flareCd -= dt;
    if (s.flareCd <= 0) {
      s.flare   = 1.0;
      s.flareCd = 6 + Math.random() * 20;   // next flare in 6-26 s
    }
    if (s.flare > 0) {
      s.flare = Math.max(0, s.flare - dt * 1.1);  // fade over ~0.9 s
    }

    // ── Base twinkle alpha ────────────────────
    const baseA  = 0.08 + 0.62 * (0.5 + 0.5 * Math.sin(ts * 0.001 * s.sp + s.ph));
    const totalA = Math.min(1, baseA + s.flare * 0.92);

    const { x, y, sz } = s;
    const isWarm = s.warm;

    // ── Sparkle glow when flaring ─────────────
    if (s.flare > 0.05) {
      const fl    = s.flare;
      const reach = sz + fl * 6;
      SCX.fillStyle = isWarm
        ? `rgba(255,230,110,${(fl * 0.30).toFixed(2)})`
        : `rgba(200,230,255,${(fl * 0.26).toFixed(2)})`;
      // Long thin arms (4-point sparkle)
      SCX.fillRect(x - reach * 2.5, y, reach * 5 + 1, 1);
      SCX.fillRect(x, y - reach * 2.5, 1, reach * 5 + 1);
    }

    // ── Star body ─────────────────────────────
    SCX.fillStyle = isWarm
      ? `rgba(255,215,75,${totalA.toFixed(2)})`
      : `rgba(210,238,255,${totalA.toFixed(2)})`;
    if (sz === 1) {
      SCX.fillRect(x, y, 1, 1);
    } else {
      SCX.fillRect(x - sz, y,      sz * 2 + 1, 1);
      SCX.fillRect(x,      y - sz, 1, sz * 2 + 1);
    }

    // ── Bright core during flare ──────────────
    if (s.flare > 0.15) {
      SCX.fillStyle = isWarm
        ? `rgba(255,252,220,${(s.flare * 0.95).toFixed(2)})`
        : `rgba(240,250,255,${(s.flare * 0.95).toFixed(2)})`;
      SCX.fillRect(x - 1, y - 1, 3, 3);
    }
  });

  requestAnimationFrame(starsLoop);
}

// ═══════════════════════════════════════════════════════════
//  RETRO AUDIO  (Web Audio API — no external files)
// ═══════════════════════════════════════════════════════════
let _audioCtx = null;

function getAudio() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
}

function playNote(ctx, freq, startOffset, dur, vol = 0.28, wave = 'square') {
  const osc  = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.type = wave;
  osc.frequency.setValueAtTime(freq, ctx.currentTime + startOffset);
  gain.gain.setValueAtTime(0, ctx.currentTime + startOffset);
  gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + startOffset + 0.01);
  gain.gain.setValueAtTime(vol, ctx.currentTime + startOffset + dur - 0.015);
  gain.gain.linearRampToValueAtTime(0, ctx.currentTime + startOffset + dur);
  osc.start(ctx.currentTime + startOffset);
  osc.stop(ctx.currentTime + startOffset + dur + 0.01);
}

// 1-minute warning — triple arcade beep, descending
function playWarningSound() {
  try {
    const ctx = getAudio();
    [[880,0.00,0.08],[880,0.13,0.08],[880,0.26,0.08],[587,0.40,0.22]]
      .forEach(([f,t,d]) => playNote(ctx, f, t, d, 0.25));
  } catch(e) {}
}

// Completion fanfare — ascending 8-bit jingle (C-E-G-C)
function playCompleteSound() {
  try {
    const ctx = getAudio();
    [[523,0.00,0.11],[659,0.13,0.11],[784,0.26,0.11],
     [1047,0.40,0.11],[784,0.53,0.08],[1047,0.63,0.35]]
      .forEach(([f,t,d]) => playNote(ctx, f, t, d, 0.30));
  } catch(e) {}
}

// ═══════════════════════════════════════════════════════════
//  MOON BURST  (CSS animation on completion)
// ═══════════════════════════════════════════════════════════
function moonBurst() {
  const el = document.getElementById('moonWrap');
  el.classList.remove('moon-burst');
  void el.offsetWidth;           // force reflow to restart animation
  el.classList.add('moon-burst');
}

// ═══════════════════════════════════════════════════════════
//  TIMER
// ═══════════════════════════════════════════════════════════
function fmt(s) {
  return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
}

function refreshTimer() {
  const el  = document.getElementById('timer');
  const pct = S.remaining / S.total;
  el.textContent = fmt(S.remaining);
  // White → cyan → gold → orange → red as time runs out
  let cls = 'timer';
  if      (pct < 0.08) cls += ' tc4';
  else if (pct < 0.22) cls += ' tc3';
  else if (pct < 0.40) cls += ' tc2';
  else if (pct < 0.65) cls += ' tc1';
  // else: white (> 65%, no extra class)
  el.className = cls;
}

function refreshProgress() {
  const pct  = S.total > 0 ? S.remaining / S.total : 1;
  const fill = document.getElementById('progressFill');
  fill.style.width = (pct * 100) + '%';
  // Match timer color stages
  let col;
  if      (pct < 0.08) col = '#FF3355';
  else if (pct < 0.22) col = '#FF8C22';
  else if (pct < 0.40) col = '#FFCC44';
  else if (pct < 0.65) col = '#44FFEE';
  else                 col = '#C0EEFF';
  fill.style.background = col;
  fill.style.boxShadow  = `0 0 7px ${col}`;
}

function toggleTimer() {
  S.running ? pauseTimer() : startTimer();
}

function startTimer() {
  if (S.remaining <= 0) return;
  getAudio();
  S.running = true;
  document.getElementById('startBtn').textContent = '⏸  PAUSAR';
  timerId = setInterval(tick, 1000);
}

function pauseTimer() {
  clearInterval(timerId);
  S.running = false;
  document.getElementById('startBtn').textContent = '▶  REANUDAR';
}

function tick() {
  if (S.remaining <= 0) return;
  S.remaining--;
  refreshTimer();
  refreshProgress();
  if (S.remaining === 60 && !S.warnedAt60) {
    S.warnedAt60 = true;
    playWarningSound();
  }
  if (S.remaining <= 0) completePomodoro();
}

function completePomodoro() {
  clearInterval(timerId);
  S.running = false;
  S.streak++;

  const bonus  = Math.floor(S.streak / 5);
  const earned = 1 + bonus;
  S.mana += earned;

  S.warnedAt60 = false;
  moonBurst();
  playCompleteSound();
  refreshMana();
  showFlash(earned, bonus);

  S.remaining = S.interval * 60;
  S.total     = S.remaining;
  refreshTimer();
  refreshProgress();
  document.getElementById('startBtn').textContent = '▶  INICIAR';
}

function resetAll() {
  clearInterval(timerId);
  S.running    = false;
  S.mana       = 0;
  S.streak     = 0;
  S.warnedAt60 = false;
  S.remaining  = S.interval * 60;
  S.total      = S.remaining;
  refreshTimer();
  refreshProgress();
  refreshMana();
  document.getElementById('startBtn').textContent = '▶  INICIAR';
}

// ═══════════════════════════════════════════════════════════
//  MANA DISPLAY
// ═══════════════════════════════════════════════════════════
function refreshMana() {
  const t   = tier();
  const col = GEM_COLORS[t];

  // Number
  const num = document.getElementById('manaNum');
  num.textContent = S.mana;
  num.className   = 'mana-num ' + (TIER_CLASSES[t] || '');

  // Gem icon recolor
  const gem = document.getElementById('gemIcon');
  gem.querySelectorAll('polygon, line').forEach(el => {
    if (el.getAttribute('stroke')) el.setAttribute('stroke', col);
    const f = el.getAttribute('fill');
    if (f && f !== 'none' && f.startsWith('rgba')) {
      // keep alpha, swap color
      el.setAttribute('fill', f.replace(/[\d.]+,[\d.]+,[\d.]+/, hexToRgb(col)));
    }
  });

  // Streak
  document.getElementById('streak').textContent = `RACHA: ${S.streak}`;

  // Bonus badge
  const badge = document.getElementById('bonusBadge');
  badge.style.opacity = S.streak >= 5 ? '1' : '0';
  if (S.streak >= 5) badge.textContent = `BONUS x${Math.floor(S.streak / 5) + 1}`;

  // Pips (up to 25)
  const pipsEl = document.getElementById('pips');
  pipsEl.innerHTML = '';
  const show = Math.min(S.mana, 25);
  for (let i = 0; i < show; i++) {
    const pt  = Math.min(Math.floor(i / 5), PIP_COLORS.length - 1);
    const div = document.createElement('div');
    div.className = 'pip on';
    div.style.setProperty('--pc', PIP_COLORS[pt]);
    pipsEl.appendChild(div);
  }
  if (S.mana > 25) {
    const ex = document.createElement('div');
    ex.className   = 'pip-extra';
    ex.textContent = `+${S.mana - 25}`;
    pipsEl.appendChild(ex);
  }
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

// ═══════════════════════════════════════════════════════════
//  COMPLETION FLASH
// ═══════════════════════════════════════════════════════════
function showFlash(earned, bonus) {
  const col   = FLASH_COLORS[tier()];
  const layer = document.getElementById('flashLayer');
  const bonusLine = bonus > 0
    ? `<div style="font-size:7px;color:#FFCC44;text-shadow:0 0 8px #FFAA00;margin-top:4px">BONUS RACHA +${bonus}</div>`
    : '';
  layer.innerHTML = `
    <div class="flash-msg" style="border-color:${col};color:${col};text-shadow:0 0 16px ${col}">
      +${earned} MANA
      <div style="font-size:8px;color:#44FF88;text-shadow:0 0 8px #44FF88">✦ COMPLETO ✦</div>
      ${bonusLine}
    </div>`;
  layer.style.display = 'flex';
  setTimeout(() => { layer.style.display = 'none'; layer.innerHTML = ''; }, 2800);
}

// ═══════════════════════════════════════════════════════════
//  INTERVAL CONTROL
// ═══════════════════════════════════════════════════════════
function adjInterval(d) {
  if (S.running) return;
  S.interval  = Math.max(1, Math.min(90, S.interval + d));
  S.remaining = S.interval * 60;
  S.total     = S.remaining;
  document.getElementById('ival').textContent = S.interval;
  refreshTimer();
  refreshProgress();
}

// ═══════════════════════════════════════════════════════════
//  VISIBILITY — catch up lost time when app returns
// ═══════════════════════════════════════════════════════════
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    hiddenAt = Date.now();
  } else if (hiddenAt && S.running) {
    const lost = Math.floor((Date.now() - hiddenAt) / 1000);
    S.remaining = Math.max(0, S.remaining - lost);
    refreshTimer();
    refreshProgress();
    if (S.remaining === 0) completePomodoro();
    hiddenAt = null;
  }
});

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
window.addEventListener('load', () => {
  initStars();
  requestAnimationFrame(starsLoop);
  refreshTimer();
  refreshProgress();
  refreshMana();
});

window.addEventListener('resize', () => {
  SC.width  = window.innerWidth;
  SC.height = window.innerHeight;
  initStars();
});
</script>
